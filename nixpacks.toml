[phases.setup]
nixPkgs = [
  "python310",
  "libGL",
  "glib",
  "libxcrypt-legacy",
  "gcc",
  "stdenv.cc.cc.lib",
  "xorg.libX11",
  "xorg.libXext",
  "xorg.libXrender",
  "xorg.libxcb",
  "xorg.libSM",
  "xorg.libICE",
  "mesa"
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info"
