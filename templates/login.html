<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mood Music Player</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">🎵 Mood Music</h1>
            <p class="login-subtitle">Your emotions, your soundtrack</p>
            
            <div class="features">
                <div class="feature">
                    <span class="feature-icon">📷</span>
                    <span>Camera Mood Detection</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🧠</span>
                    <span>Text Emotion Analysis</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🌍</span>
                    <span>Multi-Language Support</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">🎯</span>
                    <span>Personalized Recommendations</span>
                </div>
            </div>
            
            <a href="/login" class="btn-spotify">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
                Login with Spotify
            </a>
            
            <p class="login-note">
                You'll be redirected to Spotify to authorize access
            </p>
        </div>
    </div>
</body>
</html>
